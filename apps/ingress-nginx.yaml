apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: "4.12.0"
    chart: ingress-nginx
    helm:
      releaseName: ingress-nginx
      valueFiles: []
      values: |
        controller:
          # Use hostPort for k3d compatibility
          hostPort:
            enabled: true
          service:
            type: LoadBalancer
          publishService:
            enabled: true
          # Watch all namespaces for Ingress resources
          watchIngressWithoutClass: true
          ingressClassResource:
            default: true
          # Lower resources for local
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          # Metrics for Prometheus
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              namespace: monitoring
          # Admission webhooks
          admissionWebhooks:
            enabled: true
        defaultBackend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
