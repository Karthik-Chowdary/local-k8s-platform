apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://stefanprodan.github.io/podinfo
    targetRevision: "6.9.0"
    chart: podinfo
    helm:
      releaseName: podinfo
      values: |
        replicaCount: 2
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: podinfo.localhost
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        # UI settings
        ui:
          color: "#34577c"
          message: "Welcome to Local K8s Platform! 🚀"
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
