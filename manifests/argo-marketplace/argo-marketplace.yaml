apiVersion: v1
kind: Namespace
metadata:
  name: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-marketplace
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["applicationsets", "appprojects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-marketplace
subjects:
  - kind: ServiceAccount
    name: argo-marketplace
    namespace: argo-marketplace
roleRef:
  kind: ClusterRole
  name: argo-marketplace
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-marketplace-init
  namespace: argo-marketplace
data:
  init.sh: |
    #!/bin/sh
    set -e
    REPO_DIR="/repo/local-k8s-platform"
    REPO_URL="${GIT_REPO_URL:-https://github.com/Karthik-Chowdary/local-k8s-platform.git}"
    if [ ! -d "$REPO_DIR/.git" ]; then
      echo "Cloning repo..."
      git clone "$REPO_URL" "$REPO_DIR"
    else
      echo "Repo exists, pulling latest..."
      cd "$REPO_DIR" && git pull --ff-only || true
    fi
    echo "Repo ready at $REPO_DIR"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-marketplace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-marketplace
    spec:
      serviceAccountName: argo-marketplace
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command: ["sh", "/scripts/init.sh"]
          env:
            - name: GIT_REPO_URL
              value: "https://github.com/Karthik-Chowdary/local-k8s-platform.git"
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: init-script
              mountPath: /scripts
      containers:
        - name: argo-marketplace
          image: argo-marketplace:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: "*"
            - name: LOCAL_K8S_PLATFORM_PATH
              value: /repo/local-k8s-platform
            - name: ARGOCD_NAMESPACE
              value: argocd
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: repo
              mountPath: /repo
      volumes:
        - name: repo
          emptyDir: {}
        - name: init-script
          configMap:
            name: argo-marketplace-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  labels:
    app.kubernetes.io/name: argo-marketplace
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: argo-marketplace
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-marketplace
  namespace: argo-marketplace
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: marketplace.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argo-marketplace
                port:
                  name: http
